<!DOCTYPE html>

<html class="dark" lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <script src="assets/js/tailwind.js"></script>
    <script src="assets/js/marked.min.js"></script>
    <link rel="stylesheet" href="assets/css/atom-one-dark.min.css">
    <script src="assets/js/highlight.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "outline": "#767575",
                        "secondary-dim": "#599ffb",
                        "tertiary-fixed": "#bca2ff",
                        "surface-dim": "#0e0e0e",
                        "on-primary-fixed": "#000000",
                        "on-tertiary-fixed-variant": "#43208b",
                        "on-primary": "#003151",
                        "inverse-primary": "#00639e",
                        "surface-container-high": "#20201f",
                        "secondary-fixed": "#b9d3ff",
                        "on-primary-fixed-variant": "#002e4d",
                        "secondary": "#599ffb",
                        "primary-fixed-dim": "#0099f0",
                        "on-tertiary": "#3a1482",
                        "on-secondary-container": "#f6f7ff",
                        "primary-dim": "#15a4ff",
                        "secondary-container": "#005fb0",
                        "tertiary": "#bca2ff",
                        "outline-variant": "#484847",
                        "on-primary-container": "#00253f",
                        "inverse-on-surface": "#565555",
                        "primary": "#5eb4ff",
                        "primary-container": "#2aa7ff",
                        "error-dim": "#d7383b",
                        "surface-container-highest": "#262626",
                        "surface-container-lowest": "#000000",
                        "surface-variant": "#262626",
                        "on-surface-variant": "#adaaaa",
                        "on-tertiary-fixed": "#1e0053",
                        "tertiary-container": "#b091ff",
                        "on-error-container": "#ffa8a3",
                        "error-container": "#9f0519",
                        "background": "#0e0e0e",
                        "surface-container": "#1a1a1a",
                        "surface-container-low": "#131313",
                        "on-tertiary-container": "#2e0075",
                        "tertiary-fixed-dim": "#b091ff",
                        "on-secondary-fixed-variant": "#005197",
                        "primary-fixed": "#2aa7ff",
                        "on-background": "#ffffff",
                        "on-secondary": "#002043",
                        "tertiary-dim": "#ab8bf9",
                        "surface-tint": "#5eb4ff",
                        "error": "#ff716c",
                        "on-secondary-fixed": "#003466",
                        "on-surface": "#ffffff",
                        "inverse-surface": "#fcf9f8",
                        "on-error": "#490006",
                        "secondary-fixed-dim": "#a1c5ff",
                        "surface": "#0e0e0e",
                        "surface-bright": "#2c2c2c"
                    },
                    fontFamily: {
                        "headline": ["Inter"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    },
                    borderRadius: { "DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem" },
                },
            },
        }
    </script>
    <style>
        body {
            background-color: #0e0e0e;
            color: #ffffff;
            font-family: 'Inter', sans-serif;
        }

        .glow-hover:hover {
            box-shadow: 0 0 20px 0 rgba(94, 180, 255, 0.15);
            transition: all 0.3s ease-in-out;
        }

        .noise-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            opacity: 0.03;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
            z-index: 9999;
        }

        .glass-input {
            backdrop-filter: blur(20px);
            background: rgba(38, 38, 38, 0.6);
        }

        ::-webkit-scrollbar {
            width: 4px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: #262626;
            border-radius: 10px;
        }
    </style>
</head>

<body class="overflow-hidden">
    <div class="noise-overlay"></div>
    <div class="flex h-screen w-full bg-surface">
        <!-- SideNavBar -->
        <aside class="w-72 bg-surface-container-low flex flex-col border-r border-outline-variant/10 z-20">
            <div class="p-6 flex flex-col h-full">
                <!-- Header Branding -->
                <div class="flex items-center gap-3 mb-10 px-2">
                    <div
                        class="w-10 h-10 rounded-xl bg-primary flex items-center justify-center shadow-[0_0_15px_rgba(94,180,255,0.3)]">
                        <span class="material-symbols-outlined text-on-primary font-bold">bolt</span>
                    </div>
                    <div>
                        <h1 class="text-on-surface font-semibold tracking-tight leading-tight">LuminaAI</h1>
                        <p class="text-on-surface-variant text-[11px] font-medium tracking-widest">v2.0</p>
                    </div>
                </div>
                <!-- Main Actions -->
                <button id="clearBtn"
                    class="w-full bg-surface-container-highest hover:bg-surface-container-high transition-all py-3 px-4 rounded-xl flex items-center gap-3 group mb-8 glow-hover border border-outline-variant/5">
                    <span
                        class="material-symbols-outlined text-primary group-hover:scale-110 transition-transform">add</span>
                    <span class="text-on-surface font-medium text-sm">New Chat</span>
                </button>
                <!-- Navigation Tabs -->
                <nav class="flex-1 space-y-2 overflow-y-auto">
                    <div class="flex flex-col gap-1">
                        <div
                            class="flex items-center gap-3 px-4 py-3 rounded-xl bg-surface-container text-primary font-medium cursor-pointer">
                            <span class="material-symbols-outlined" data-weight="fill"
                                style="font-variation-settings: 'FILL' 1;">history</span>
                            <span class="text-sm">History</span>
                        </div>
                        <div id="settingsBtn"
                            class="flex items-center gap-3 px-4 py-3 rounded-xl text-on-surface-variant hover:text-on-surface hover:bg-surface-container/50 transition-colors cursor-pointer">
                            <span class="material-symbols-outlined">settings</span>
                            <span class="text-sm">Settings</span>
                        </div>
                        <div id="modelsBtn"
                            class="flex items-center gap-3 px-4 py-3 rounded-xl text-on-surface-variant hover:text-on-surface hover:bg-surface-container/50 transition-colors cursor-pointer">
                            <span class="material-symbols-outlined">database</span>
                            <span class="text-sm">Models</span>
                        </div>
                        <div
                            class="flex items-center gap-3 px-4 py-3 rounded-xl text-on-surface-variant hover:text-on-surface hover:bg-surface-container/50 transition-colors cursor-pointer">
                            <span class="material-symbols-outlined">help</span>
                            <span class="text-sm">Help</span>
                        </div>
                    </div>
                    <!-- History Group -->
                    <div class="mt-8">
                        <p class="text-[10px] font-bold text-on-surface-variant uppercase tracking-widest px-4 mb-4">
                            Recent History</p>
                        <div class="space-y-1" id="historyList">
                        </div>
                    </div>
                </nav>
                <!-- Footer -->
                <div class="pt-6 border-t border-outline-variant/10">
                    <div class="flex items-center gap-3 p-2 mb-4">
                        <img alt="User Profile" class="w-8 h-8 rounded-full border border-primary/20"
                            data-alt="Professional male portrait avatar"
                            src="assets/icons/avatar.png" />
                        <span class="text-sm font-medium text-on-surface">Alex River</span>
                    </div>
                    <button
                        class="w-full flex items-center gap-3 px-4 py-3 rounded-xl text-error-dim hover:bg-error-container/10 transition-colors">
                        <span class="material-symbols-outlined">logout</span>
                        <span class="text-sm">Log out</span>
                    </button>
                </div>
            </div>
        </aside>
        <!-- Main Content Area -->
        <main class="flex-1 flex flex-col bg-surface relative overflow-hidden">
            <!-- TopNavBar -->
            <header
                class="h-16 flex items-center justify-between px-8 bg-surface/80 backdrop-blur-md border-b border-outline-variant/5 z-10">
                <div class="flex items-center gap-2">
                    <span class="text-on-surface font-semibold tracking-tight">LuminaAI</span>
                    <span class="h-4 w-[1px] bg-outline-variant/20 mx-2"></span>
                    <span class="text-on-surface-variant text-xs font-medium">Untitled Chat</span>
                </div>
                <div class="flex items-center gap-2">
                    <button
                        class="w-9 h-9 flex items-center justify-center rounded-lg hover:bg-surface-container transition-colors text-on-surface-variant">
                        <span class="material-symbols-outlined text-[20px]">light_mode</span>
                    </button>
                    <button
                        class="w-9 h-9 flex items-center justify-center rounded-lg hover:bg-surface-container transition-colors text-on-surface-variant">
                        <span class="material-symbols-outlined text-[20px]">minimize</span>
                    </button>
                    <button
                        class="w-9 h-9 flex items-center justify-center rounded-lg hover:bg-surface-container transition-colors text-on-surface-variant">
                        <span class="material-symbols-outlined text-[20px]">fullscreen</span>
                    </button>
                    <button
                        class="w-9 h-9 flex items-center justify-center rounded-lg hover:bg-surface-container transition-colors text-on-surface-variant">
                        <span class="material-symbols-outlined text-[20px]">close</span>
                    </button>
                </div>
            </header>
            <!-- Chat Stage -->
            <div class="flex-1 overflow-y-auto px-6 py-12 scroll-smooth">
                <div id="chatCanvas" class="max-w-4xl mx-auto space-y-8 flex flex-col pb-20"></div>
            </div>
            <div class="p-6 relative bg-gradient-to-t from-surface to-transparent">
                <div class="max-w-4xl mx-auto">
                    <div
                        class="glass-input rounded-[2rem] p-2 border border-outline-variant/10 shadow-2xl relative overflow-hidden group">
                        <!-- Bottom focus line -->
                        <div
                            class="absolute bottom-0 left-1/2 -translate-x-1/2 h-[1px] w-0 bg-primary group-focus-within:w-full transition-all duration-500">
                        </div>
                        <div class="flex items-end gap-2 px-4 py-2">
                            <button id="attachBtn"
                                class="w-10 h-10 flex items-center justify-center rounded-full text-on-surface-variant hover:bg-surface-container transition-colors glow-hover">
                                <span class="material-symbols-outlined">attach_file</span>
                            </button>
                            <textarea id="promptInput"
                                class="flex-1 bg-transparent border-none focus:ring-0 text-on-surface placeholder:text-on-surface-variant py-2.5 max-h-32 resize-none text-[1.125rem]"
                                placeholder="Message ChatAI..." rows="1"></textarea>
                            <button
                                class="w-10 h-10 flex items-center justify-center rounded-full text-on-surface-variant hover:bg-surface-container transition-colors">
                                <span class="material-symbols-outlined">mic</span>
                            </button>
                            <button id="sendBtn"
                                class="w-12 h-12 flex items-center justify-center rounded-full bg-primary text-on-primary shadow-[0_0_20px_rgba(94,180,255,0.2)] hover:scale-105 transition-transform">
                                <span class="material-symbols-outlined">send</span>
                            </button>
                        </div>
                    </div>
                    <div class="flex justify-center mt-3">
                        <p class="text-[10px] text-on-surface-variant/60 font-medium">ChatAI can make mistakes. Check
                            important info.</p>
                    </div>
                </div>
            </div>
            <!-- Ambient Atmospheric Elements -->
            <div
                class="absolute -top-40 -right-40 w-96 h-96 bg-primary/5 blur-[120px] rounded-full pointer-events-none">
            </div>
            <div
                class="absolute -bottom-40 -left-40 w-96 h-96 bg-tertiary/5 blur-[120px] rounded-full pointer-events-none">
            </div>
        </main>
    </div>

    <script src="qrc:///qtwebchannel/qwebchannel.js"></script>
    <script>
        var backend;
        var md2html = function (text) {
            if (typeof marked !== 'undefined') {
                return marked.parse(text);
            }
            return text.replace(/\n/g, '<br>').replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
        };

        var applyHighlight = function (element) {
            if (typeof hljs !== 'undefined') {
                element.querySelectorAll('pre code').forEach((block) => {
                    hljs.highlightElement(block);
                });
            }
        };

        window.onload = function () {
            if (typeof QWebChannel !== 'undefined') {
                new QWebChannel(qt.webChannelTransport, function (channel) {
                    backend = channel.objects.backend;

                    // Attach to UI events
                    const promptInput = document.getElementById('promptInput');
                    const sendBtn = document.getElementById('sendBtn');
                    const themeToggleBtn = document.getElementById('themeToggleBtn');
                    const settingsBtn = document.getElementById('settingsBtn');
                    const modelsBtn = document.getElementById('modelsBtn');
                    const clearBtn = document.getElementById('clearBtn');
                    const attachBtn = document.getElementById('attachBtn');

                    if (promptInput && sendBtn) {
                        sendBtn.addEventListener('click', function () {
                            const text = promptInput.value.trim();
                            if (text) {
                                backend.send_message(text);
                                promptInput.value = '';
                                sendBtn.disabled = true;
                                sendBtn.classList.remove('opacity-100');
                                sendBtn.classList.add('opacity-50');
                            }
                        });

                        promptInput.addEventListener('input', function () {
                            if (promptInput.value.trim().length > 0) {
                                sendBtn.disabled = false;
                                sendBtn.classList.remove('opacity-50');
                                sendBtn.classList.add('opacity-100');
                            } else {
                                sendBtn.disabled = true;
                                sendBtn.classList.remove('opacity-100');
                                sendBtn.classList.add('opacity-50');
                            }
                        });

                        promptInput.addEventListener('keydown', function (e) {
                            if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) {
                                sendBtn.click();
                            }
                        });
                    }

                    if (themeToggleBtn) {
                        themeToggleBtn.addEventListener('click', function () {
                            backend.toggle_theme();
                        });
                    }

                    if (settingsBtn) {
                        settingsBtn.addEventListener('click', function () {
                            backend.open_settings();
                        });
                    }

                    if (modelsBtn) {
                        modelsBtn.addEventListener('click', function () {
                            backend.open_models();
                        });
                    }

                    if (attachBtn) {
                        attachBtn.addEventListener('click', function () {
                            backend.attach_file();
                        });
                    }

                    if (clearBtn) {
                        clearBtn.addEventListener('click', function () {
                            backend.clear_chat();
                        });
                    }

                    // Tell backend we are ready
                    backend.page_loaded();
                });
            } else {
                console.error("QWebChannel is not defined. Ensure qrc:///qtwebchannel/qwebchannel.js is loaded.");
            }
        };

        // Functions called by backend
        let currentAiMessageContent = null;

        window.clearHistory = function () {
            const canvas = document.getElementById('chatCanvas');
            if (canvas) {
                canvas.innerHTML = '';
            }
        };

        window.addMessage = function (role, content, avatarUrl) {
            const canvas = document.getElementById('chatCanvas');
            if (!canvas) return;

            const div = document.createElement('div');

            if (role === 'user') {
                div.className = 'flex gap-4 items-start justify-end pl-4 md:pl-12 my-6';
                div.innerHTML = `
                    <div class="bg-primary-container text-on-primary p-4 md:p-6 rounded-2xl rounded-tr-none shadow-md max-w-[85%] break-words">
                        <p class="leading-relaxed body-lg">${md2html(content)}</p>
                    </div>
                `;
            } else {
                div.className = 'flex gap-4 items-start pr-4 md:pr-12 my-6';
                let iconHtml = `<span class="material-symbols-outlined text-on-surface-variant" style="font-variation-settings: 'FILL' 1;">smart_toy</span>`;
                div.innerHTML = `
                    <div class="w-10 h-10 rounded-xl bg-surface-container flex items-center justify-center shrink-0 border border-outline-variant/10">
                        ${iconHtml}
                    </div>
                    <div class="flex flex-col gap-4 max-w-3xl">
                        <div class="bg-surface-container-lowest p-4 md:p-6 rounded-2xl rounded-tl-none shadow-sm border border-outline-variant/10">
                            <p class="text-on-surface leading-relaxed body-md content-p">${md2html(content)}</p>
                        </div>
                    </div>
                `;
            }

            canvas.appendChild(div);
            div.scrollIntoView({ behavior: 'smooth', block: 'end' });

            if (role === 'assistant') {
                currentAiMessageContent = div.querySelector('.content-p');
                currentAiMessageContent.rawText = content;
            } else {
                currentAiMessageContent = null;
            }
            applyHighlight(div);
        };

        window.startAiMessage = function () {
            addMessage('assistant', '');
        };

        window.appendAiToken = function (token) {
            if (currentAiMessageContent) {
                currentAiMessageContent.rawText = (currentAiMessageContent.rawText || '') + token;
                currentAiMessageContent.innerHTML = md2html(currentAiMessageContent.rawText);
                applyHighlight(currentAiMessageContent);
                currentAiMessageContent.scrollIntoView({ behavior: 'smooth', block: 'end' });
            }
        };

        window.renderHistory = function (chats) {
            const list = document.getElementById('historyList');
            if (!list) return;
            list.innerHTML = '';
            chats.forEach(chat => {
                const container = document.createElement('div');
                container.className = "group flex items-center justify-between px-4 py-2.5 rounded-lg text-sm text-on-surface-variant hover:bg-surface-container/40 hover:text-on-surface cursor-pointer transition-colors";
                
                const titleSpan = document.createElement('span');
                titleSpan.className = "truncate flex-1";
                titleSpan.innerText = chat.title || 'Untitled Chat';
                titleSpan.onclick = () => backend.load_chat(chat.id);
                
                const editBtn = document.createElement('button');
                editBtn.className = "material-symbols-outlined text-[16px] opacity-0 group-hover:opacity-100 transition-opacity hover:text-primary p-1 shrink-0";
                editBtn.innerText = "edit";
                editBtn.onclick = (e) => {
                    e.stopPropagation();
                    const newTitle = prompt("Enter new chat name:", chat.title || 'Untitled Chat');
                    if (newTitle && newTitle.trim().length > 0) {
                        backend.rename_chat(chat.id, newTitle.trim());
                    }
                };
                
                container.appendChild(titleSpan);
                container.appendChild(editBtn);
                list.appendChild(container);
            });
        };

        window.finishAiMessage = function () {
            currentAiMessageContent = null;
            const promptInput = document.getElementById('promptInput');
            if (promptInput) promptInput.focus();
        };

        window.setAiState = function (isGenerating) {
            const sendBtn = document.getElementById('sendBtn');
            const promptInput = document.getElementById('promptInput');
            if (sendBtn && promptInput) {
                if (isGenerating) {
                    sendBtn.disabled = true;
                    promptInput.disabled = true;
                    sendBtn.classList.remove('opacity-100');
                    sendBtn.classList.add('opacity-50');
                } else {
                    promptInput.disabled = false;
                    if (promptInput.value.trim().length > 0) {
                        sendBtn.disabled = false;
                        sendBtn.classList.remove('opacity-50');
                        sendBtn.classList.add('opacity-100');
                    }
                }
            }
        };
    </script>
</body>

</html>
